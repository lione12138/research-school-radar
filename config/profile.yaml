# Topic keywords gate academic relevance: a candidate must match at least
# one of these to qualify. The list is deliberately broad so high-quality
# funded summer schools across all disciplines can qualify, while the gate
# still blocks non-academic noise (tourism, language-only, marketing).
# The hard quality filters (deadline, duration, funding/fee, in-person)
# are unchanged and apply identically to every discipline.
preferred_topics:
  # Water, climate, and earth (original core domain)
  - hydrology
  - hydrogeology
  - water resources
  - water
  - climate
  - climate extremes
  - environmental modelling
  - environmental science
  - remote sensing
  - earth observation
  - geoscience
  - geology
  - geophysics
  - seismology
  - oceanography
  - atmospheric science
  - meteorology
  - glaciology
  - ecology
  - biodiversity
  - sustainability
  - energy
  - renewable energy
  - disaster risk
  - soil science
  - agriculture
  - forestry
  - uncertainty quantification
  # Computing, mathematics, and AI
  - AI
  - machine learning
  - deep learning
  - scientific machine learning
  - data science
  - statistics
  - mathematics
  - computer science
  - robotics
  - computer vision
  - natural language processing
  - high performance computing
  - quantum computing
  - cybersecurity
  - bioinformatics
  - optimization
  - network science
  # Physics, chemistry, and materials
  - physics
  - astrophysics
  - astronomy
  - cosmology
  - quantum
  - particle physics
  - condensed matter
  - photonics
  - optics
  - plasma
  - chemistry
  - materials science
  - nanotechnology
  - catalysis
  # Life sciences and health
  - biology
  - molecular biology
  - genomics
  - genetics
  - neuroscience
  - biotechnology
  - microbiology
  - evolution
  - immunology
  - biomedical
  - medicine
  - public health
  - epidemiology
  - global health
  - pharmacology
  # Engineering
  - engineering
  - mechanical engineering
  - electrical engineering
  - civil engineering
  - aerospace
  - biomedical engineering
  # Social sciences and humanities
  - economics
  - finance
  - political science
  - sociology
  - psychology
  - anthropology
  - demography
  - international relations
  - public policy
  - development studies
  - human rights
  - law
  - philosophy
  - linguistics
  - education
  - history
  - archaeology
  - digital humanities
  - gender studies
  - migration
  - urban studies

hard_filters:
  minimum_duration_days: 8
  require_funding_or_low_fee: true
  allow_online_only: false
  require_open_deadline: true

# Fixed, approximate reference rates keep the scanner free and API-key-free.
# They intentionally slightly overestimate EUR cost to reduce false inclusions.
financial_access:
  maximum_unfunded_fee_eur: 400
  approximate_currency_to_eur:
    EUR: 1.0
    USD: 0.95
    GBP: 1.20
    CHF: 1.10
    CNY: 0.13
    JPY: 0.006
    INR: 0.0115
    KRW: 0.00068
    SGD: 0.72
    AUD: 0.62
    CAD: 0.70

priority_regions:
  - UK
  - continental Europe
  - East Asia
  - Southeast Asia

supplementary_regions:
  - North America
  - Australia and New Zealand
  - South Asia
  - Middle East
  - Africa
  - Latin America

excluded_programme_types:
  - pure language course
  - undergraduate-only
  - tourism-oriented
  - business-only
  - high-fee without funding
  - PhD degree programme
  - doctoral admission
  - PhD position
  - full-time doctoral programme
  - graduate school enrollment

doctoral_school_scope:
  include: short-term doctoral schools, PhD schools, and graduate training schools when they are seasonal research training opportunities
  exclude: PhD admissions, PhD positions, full-time degree programmes, and ordinary graduate school enrollment
